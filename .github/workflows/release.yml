name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3)'
        required: true
        type: string

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
      
      - name: Get Flutter version
        id: flutter-version
        run: |
          if [ -f ".fvmrc" ]; then
            VERSION=$(grep "flutter" .fvmrc | cut -d'"' -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [ -f ".dcodax-ci.yaml" ]; then
            VERSION=$(grep "flutter_version:" .dcodax-ci.yaml | cut -d':' -f2 | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.FLUTTER_VERSION }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: 'stable'
          cache: true
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}
          key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, including all commits"
            COMMITS=$(git log --pretty=format:"%s" --no-merges)
          else
            echo "Previous tag: $PREVIOUS_TAG"
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"%s" --no-merges)
          fi
          
          # Parse conventional commits
          FEATURES=""
          FIXES=""
          BREAKING=""
          OTHERS=""
          
          while IFS= read -r commit; do
            if echo "$commit" | grep -q "^feat"; then
              DESC=$(echo "$commit" | sed 's/^feat[^:]*: //')
              FEATURES="${FEATURES}- ${DESC}\n"
            elif echo "$commit" | grep -q "^fix"; then
              DESC=$(echo "$commit" | sed 's/^fix[^:]*: //')
              FIXES="${FIXES}- ${DESC}\n"
            elif echo "$commit" | grep -q "BREAKING CHANGE"; then
              DESC=$(echo "$commit" | sed 's/^[^:]*: //')
              BREAKING="${BREAKING}- ${DESC}\n"
            elif echo "$commit" | grep -qE "^(chore|docs|refactor|test|ci|perf|style|build)"; then
              # Skip non-user-facing changes
              continue
            else
              OTHERS="${OTHERS}- ${commit}\n"
            fi
          done <<< "$COMMITS"
          
          # Build changelog
          CHANGELOG="## What's Changed\n\n"
          
          if [ ! -z "$BREAKING" ]; then
            CHANGELOG="${CHANGELOG}### ⚠️ BREAKING CHANGES\n${BREAKING}\n"
          fi
          
          if [ ! -z "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### ✨ Features\n${FEATURES}\n"
          fi
          
          if [ ! -z "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIXES}\n"
          fi
          
          if [ ! -z "$OTHERS" ]; then
            CHANGELOG="${CHANGELOG}### 📝 Other Changes\n${OTHERS}\n"
          fi
          
          # Save to file
          echo -e "$CHANGELOG" > /tmp/changelog.md
          
          # Also save for GitHub output (escape newlines)
          CHANGELOG_ESCAPED=$(echo -e "$CHANGELOG" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Update CHANGELOG.md
        run: |
          CHANGELOG_FILE="CHANGELOG.md"
          NEW_ENTRY="# ${{ steps.version.outputs.version }} ($(date +%Y-%m-%d))\n\n$(cat /tmp/changelog.md)\n"
          
          if [ -f "$CHANGELOG_FILE" ]; then
            # Prepend to existing changelog
            echo -e "${NEW_ENTRY}\n$(cat $CHANGELOG_FILE)" > $CHANGELOG_FILE
          else
            # Create new changelog
            echo -e "# Changelog\n\n${NEW_ENTRY}" > $CHANGELOG_FILE
          fi
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add $CHANGELOG_FILE
          git commit -m "docs: update CHANGELOG for ${{ steps.version.outputs.version }} [skip ci]" || true
          git push || true
      
      - name: Auto-generate SETUP.md
        run: |
          echo "Generating SETUP.md..."
          
          # Get Flutter version
          if [ -f ".fvmrc" ]; then
            FLUTTER_VER=$(grep "flutter" .fvmrc | cut -d'"' -f2)
          else
            FLUTTER_VER="${{ steps.flutter-version.outputs.version }}"
          fi
          
          # Extract dependencies from pubspec.yaml (simple approach without yq)
          DEPS=$(grep -A 100 "^dependencies:" pubspec.yaml | grep -B 100 "^dev_dependencies:" | grep ":" | grep -v "^dependencies:" | grep -v "^dev_dependencies:" | sed 's/^  /- /' || echo "")
          
          # Get environment variables from .env.example or scan code
          ENV_VARS=""
          if [ -f ".env.example" ]; then
            ENV_VARS=$(grep -E '^[A-Z_]+=' .env.example | sed 's/=.*//' | sed 's/^/- `/' | sed 's/$/`/')
          else
            # Scan for common env var patterns in code
            ENV_VARS=$(grep -rh 'String\.fromEnvironment\|dotenv' lib/ 2>/dev/null | grep -oP "'[A-Z_]+'" | sort -u | sed "s/'//g" | sed 's/^/- `/' | sed 's/$/`/' || echo "None detected")
          fi
          
          # Detect build flavors
          FLAVORS=""
          if [ -f "android/app/build.gradle" ]; then
            FLAVORS=$(grep -A 10 'productFlavors' android/app/build.gradle | grep -oP '^\s+\K\w+(?=\s*\{)' | sed 's/^/- `/' | sed 's/$/`/' || echo "")
          fi
          
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT_SHA="${{ github.sha }}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          
          cat > SETUP.md <<'SETUP_EOF_HEREDOC'
# Project Setup Guide

