name: Develop Branch Quality Scan

on:
  workflow_dispatch:
  push:
    branches: [develop]

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  quality-scan:
    name: Quality Scan on Develop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
      MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
      CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Changed Files
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.dart' 2>/dev/null | head -50 || true)
          echo "$CHANGED" > /tmp/changed_files.txt
          if [ -z "$CHANGED" ]; then
            COUNT=0
          else
            COUNT=$(echo "$CHANGED" | wc -l | tr -d ' ')
          fi
          echo "CHANGED_COUNT=$COUNT" >> $GITHUB_ENV

      - name: Check Code Quality
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos > /tmp/analyze.txt 2>&1 || true
          ERRORS=$(grep -c "error" /tmp/analyze.txt 2>/dev/null || echo "0")
          WARNINGS=$(grep -c "warning" /tmp/analyze.txt 2>/dev/null || echo "0")
          echo "ERRORS=$ERRORS" >> $GITHUB_ENV
          echo "WARNINGS=$WARNINGS" >> $GITHUB_ENV

      - name: Check Test Coverage
        run: |
          flutter test --coverage 2>&1 || true
          if [ -f "coverage/lcov.info" ]; then
            sudo apt-get update -qq && sudo apt-get install -y lcov -qq
            COV=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//' | head -1)
            echo "COVERAGE=${COV:-0}" >> $GITHUB_ENV
          else
            echo "COVERAGE=0" >> $GITHUB_ENV
          fi

      - name: Check for Secrets
        run: |
          FOUND=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | while read f; do [ -f "$f" ] && grep -ilE "password|secret|token|key" "$f" 2>/dev/null; done | wc -l | tr -d ' ')
          echo "SECRETS_FOUND=${FOUND:-0}" >> $GITHUB_ENV

      - name: Post Results to Mattermost
        if: always()
        run: |
          export REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          export COMMIT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          export SEC_STATUS="Clean"
          [ "$SECRETS_FOUND" -gt 0 ] 2>/dev/null && export SEC_STATUS="Potential issues"

          export MSG="### Quality Scan - ${REPO_NAME}\n**Commit:** ${COMMIT_SHA}\n**Files:** ${CHANGED_COUNT}\n**Errors:** ${ERRORS} | **Warnings:** ${WARNINGS}\n**Coverage:** ${COVERAGE}%\n**Secrets:** ${SEC_STATUS}"

          export PAYLOAD=$(jq -n --arg ch "$CHANNEL_ID" --arg msg "$MSG" '{channel_id:$ch, message:$msg}')

          curl -s "$MATTERMOST_URL/api/v4/posts" \
            -H "Authorization: Bearer $MATTERMOST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      - name: Create Issues for Errors
        if: env.ERRORS != '0'
        run: |
          export AUTHOR=$(git log -1 --pretty=format:'%an')

          gh issue create \
            --title "[Quality] Errors found in develop branch" \
            --body "Quality scan found ${ERRORS} errors. Commit: ${GITHUB_SHA} Author: ${AUTHOR}" \
            --label "quality,develop" || true
