name: Distribute iOS to TestFlight

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  distribute:
    name: Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Set environment variables for App Store Connect
          echo "Issuer: $APP_STORE_CONNECT_ISSUER_ID"
          echo "Setup complete"

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Version
        run: |
          export VERSION=$(grep "version:" pubspec.yaml | sed 's/version: *//' | xargs)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios && pod install

      - name: Import Certificates
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASS: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          pip install codemagic-cli-tools
          keychain initialize
          echo "$CERT_BASE64" | base64 -d > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password "$CERT_PASS"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision

      - name: Build and Upload
        run: |
          flutter build ipa --release
          xcode-project use-profiles
          app-store-connect publish --path build/ios/ipa/*.ipa || true
