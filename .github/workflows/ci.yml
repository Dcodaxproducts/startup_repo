name: CI — Lint, Test, Analyze

on:
  push:
    branches: [development, testing, production]
  pull_request:
    branches: [development, testing, production]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
      MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        id: format
        run: dart format --set-exit-if-changed .
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Analyze code
        id: analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' }}

      - name: Run tests
        id: test
        run: flutter test --coverage
        continue-on-error: true

      - name: Upload coverage
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

      - name: PR Comment — Quality Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const format = '${{ steps.format.outcome }}';
            const analyze = '${{ steps.analyze.outcome }}';
            const test = '${{ steps.test.outcome }}';
            const icon = (s) => s === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔍 CI Quality Report\n| Check | Status |\n|-------|--------|\n| Format | ${icon(format)} ${format} |\n| Analyze | ${icon(analyze)} ${analyze} |\n| Tests | ${icon(test)} ${test} |`
            });

      - name: Notify Mattermost on failure
        if: failure()
        run: |
          REPO_NAME="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg channel "bwgii3aooiy39cpy1tu7tcp6tc" \
            --arg message "❌ **CI Failed** on \`$REPO_NAME\` branch \`$BRANCH\`\n[View Run]($RUN_URL)" \
            '{channel_id: $channel, message: $message}' | \
          curl -s -X POST "$MATTERMOST_URL/api/v4/posts" \
            -H "Authorization: Bearer $MATTERMOST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-
