name: Build iOS

on:
  push:
    branches: [testing, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get Flutter version
        id: flutter-version
        run: |
          if [ -f ".fvmrc" ]; then
            VERSION=$(grep "flutter" .fvmrc | cut -d'"' -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [ -f ".dcodax-ci.yaml" ]; then
            VERSION=$(grep "flutter_version:" .dcodax-ci.yaml | cut -d':' -f2 | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.FLUTTER_VERSION }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: 'stable'
          cache: true
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}
          key: flutter-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            flutter-${{ runner.os }}-
      
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Get last commit author
        id: author
        run: |
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          AUTHOR_NAME=$(git log -1 --pretty=format:'%an')
          echo "email=${AUTHOR_EMAIL}" >> $GITHUB_OUTPUT
          echo "name=${AUTHOR_NAME}" >> $GITHUB_OUTPUT
          echo "Last commit by: ${AUTHOR_NAME} <${AUTHOR_EMAIL}>"
      
      - name: Auto-increment build number
        id: increment
        run: |
          # Get current version from pubspec.yaml
          CURRENT_VERSION=$(grep "version:" pubspec.yaml | sed 's/version: //' | xargs)
          VERSION_NAME=$(echo $CURRENT_VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d'+' -f2)
          
          # Increment build number
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEW_VERSION="${VERSION_NAME}+${NEW_BUILD_NUMBER}"
          
          echo "Current: $CURRENT_VERSION"
          echo "New: $NEW_VERSION"
          
          # Update pubspec.yaml
          sed -i '' "s/version: ${CURRENT_VERSION}/version: ${NEW_VERSION}/" pubspec.yaml
          
          # Update iOS build number
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${NEW_BUILD_NUMBER}" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION_NAME}" ios/Runner/Info.plist
          
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_number=${NEW_BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "full_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
      
      - name: Commit version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pubspec.yaml ios/Runner/Info.plist
          git commit -m "ci: bump iOS version to ${{ steps.increment.outputs.full_version }} [skip ci]" || true
          git push || true
      
      - name: Setup certificates and provisioning profiles
        run: |
          # This is a placeholder - actual implementation depends on your cert management
          # Options:
          # 1. Use Fastlane match
          # 2. Store certs in GitHub secrets
          # 3. Use App Store Connect API
          
          echo "Setting up certificates..."
          # Example: import from secrets
          # echo "${{ secrets.IOS_CERTIFICATE }}" | base64 -d > cert.p12
          # security import cert.p12 -P "${{ secrets.IOS_CERT_PASSWORD }}"
          
          echo "⚠️ Certificate setup not configured - update this step for your team"
      
      - name: Build iOS archive
        run: |
          flutter build ios --release --no-codesign
          
          # For signed build (uncomment and configure):
          # cd ios
          # xcodebuild -workspace Runner.xcworkspace \
          #   -scheme Runner \
          #   -configuration Release \
          #   -archivePath build/Runner.xcarchive \
          #   archive
          
          echo "✅ iOS build completed"
      
      - name: Export IPA
        run: |
          # This requires proper code signing setup
          # cd ios
          # xcodebuild -exportArchive \
          #   -archivePath build/Runner.xcarchive \
          #   -exportPath build \
          #   -exportOptionsPlist ExportOptions.plist
          
          echo "⚠️ IPA export not configured - requires code signing"
      
      - name: Get IPA size
        id: sizes
        run: |
          if [ -f "ios/build/Runner.ipa" ]; then
            IPA_SIZE=$(du -h ios/build/Runner.ipa | cut -f1)
            IPA_SIZE_MB=$(du -m ios/build/Runner.ipa | cut -f1)
            echo "ipa_size=${IPA_SIZE}" >> $GITHUB_OUTPUT
            echo "ipa_size_mb=${IPA_SIZE_MB}" >> $GITHUB_OUTPUT
            echo "IPA size: ${IPA_SIZE}"
          else
            echo "ipa_size=N/A" >> $GITHUB_OUTPUT
            echo "ipa_size_mb=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate build metadata
        id: metadata
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION="${{ steps.increment.outputs.full_version }}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          FLUTTER_VERSION=$(flutter --version | head -n1 | cut -d' ' -f2)
          PR_NUMBER=$(git log -1 --pretty=format:'%s' | grep -oP '#\K\d+' || echo "")
          
          cat > build-metadata.json <<EOF
          {
            "version": "${{ steps.increment.outputs.version_name }}",
            "build_number": "${{ steps.increment.outputs.build_number }}",
            "full_version": "${VERSION}",
            "branch": "${BRANCH_NAME}",
            "commit": "${{ github.sha }}",
            "commit_message": "${COMMIT_MSG}",
            "author": "${{ steps.author.outputs.name }}",
            "author_email": "${{ steps.author.outputs.email }}",
            "pr_number": "${PR_NUMBER}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "flutter_version": "${FLUTTER_VERSION}",
            "size_mb": ${{ steps.sizes.outputs.ipa_size_mb }},
            "artifacts": {
              "ipa": "Runner.ipa"
            },
            "platform": "ios"
          }
          EOF
          
          cat build-metadata.json
          echo "✅ Build metadata generated"
      
      - name: Upload to TestFlight
        if: success()
        run: |
          # Option 1: Using xcrun altool (deprecated but still works)
          # xcrun altool --upload-app \
          #   --type ios \
          #   --file ios/build/Runner.ipa \
          #   --username "${{ secrets.APPLE_ID }}" \
          #   --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          
          # Option 2: Using App Store Connect API (recommended)
          # xcrun altool --upload-app \
          #   --type ios \
          #   --file ios/build/Runner.ipa \
          #   --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY }}" \
          #   --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER }}"
          
          echo "⚠️ TestFlight upload not configured - requires Apple credentials"
      
      - name: Upload to S3
        if: success()
        id: s3-upload
        run: |
          # Install AWS CLI
          brew install awscli
          
          # Configure AWS
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_REGION="${{ secrets.AWS_REGION }}"
          
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          VERSION="${{ steps.increment.outputs.full_version }}"
          
          S3_PATH="s3://${{ secrets.AWS_BUCKET_NAME }}/${REPO_NAME}/${BRANCH_NAME}/${VERSION}/"
          
          # Upload IPA if it exists
          if [ -f "ios/build/Runner.ipa" ]; then
            aws s3 cp ios/build/Runner.ipa ${S3_PATH}
            
            # Upload build metadata
            aws s3 cp build-metadata.json ${S3_PATH}build-metadata.json
            
            # Update latest.json for this branch
            LATEST_JSON_PATH="s3://${{ secrets.AWS_BUCKET_NAME }}/${REPO_NAME}/${BRANCH_NAME}/latest-ios.json"
            
            # Add download URL to metadata
            IPA_URL=$(aws s3 presign "${S3_PATH}Runner.ipa" --expires-in 604800)
            jq --arg url "$IPA_URL" '.download_url = $url' build-metadata.json > latest-ios.json
            aws s3 cp latest-ios.json ${LATEST_JSON_PATH}
            
            echo "ipa_url=${IPA_URL}" >> $GITHUB_OUTPUT
            echo "✅ Uploaded to S3: ${S3_PATH}"
            echo "✅ Updated latest-ios.json at ${LATEST_JSON_PATH}"
          fi
      
      - name: Post success to Mattermost
        if: success()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          PAYLOAD=$(cat <<EOF
          {
            "text": "### ✅ iOS Build Successful\n**Repository:** ${REPO_NAME}\n**Branch:** ${BRANCH_NAME}\n**Version:** ${{ steps.increment.outputs.full_version }}\n**Build Number:** ${{ steps.increment.outputs.build_number }}\n**IPA Size:** ${{ steps.sizes.outputs.ipa_size }}\n**Commit:** [${{ github.sha }}](${{ github.event.head_commit.url }})\n**Author:** ${{ steps.author.outputs.name }}\n\n**TestFlight:** Upload in progress (check email)\n\n*Build available on TestFlight in ~15 minutes*"
          }
          EOF
          )
          
          curl -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      
      - name: Get commit author Mattermost handle
        if: failure()
        id: mattermost-user
        run: |
          echo "handle=@${{ steps.author.outputs.name }}" >> $GITHUB_OUTPUT
      
      - name: Post failure to Mattermost
        if: failure()
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          PAYLOAD=$(cat <<EOF
          {
            "text": "### 🚨 iOS Build Failed\n**Repository:** ${REPO_NAME}\n**Branch:** ${BRANCH_NAME}\n**Commit:** [${{ github.sha }}](${{ github.event.head_commit.url }})\n**Author:** ${{ steps.author.outputs.name }} (${{ steps.mattermost-user.outputs.handle }})\n\n**Action:** [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n${{ steps.mattermost-user.outputs.handle }} please check the build logs."
          }
          EOF
          )
          
          curl -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-artifacts
          path: |
            ios/build/*.ipa
            ios/build/Runner.xcarchive
          retention-days: 30
