name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.2.3)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android-release:
    name: Android Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          printf "%s" "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "storeFile=keystore.jks" > android/key.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload to S3
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          aws s3 cp build/app/outputs/flutter-apk/app-release.apk \
            "s3://$AWS_BUCKET_NAME/releases/$REPO_NAME/$VERSION/app-release.apk"
          aws s3 cp build/app/outputs/bundle/release/app-release.aab \
            "s3://$AWS_BUCKET_NAME/releases/$REPO_NAME/$VERSION/app-release.aab"

          S3_APK="https://$AWS_BUCKET_NAME.s3.$AWS_REGION.amazonaws.com/releases/$REPO_NAME/$VERSION/app-release.apk"
          S3_AAB="https://$AWS_BUCKET_NAME.s3.$AWS_REGION.amazonaws.com/releases/$REPO_NAME/$VERSION/app-release.aab"
          echo "S3_APK_URL=$S3_APK" >> $GITHUB_ENV
          echo "S3_AAB_URL=$S3_AAB" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios-release:
    name: iOS Release Build (→ TestFlight)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      DIST_CERTIFICATE_BASE64: ${{ secrets.DIST_CERTIFICATE_BASE64 }}
      DIST_CERTIFICATE_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update
        continue-on-error: true

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Import distribution certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$DIST_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Install Apple API key for automatic provisioning
        run: |
          mkdir -p ~/private_keys
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign

      - name: Archive and export IPA
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic

          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa-output" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa-output" -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA file found"
            exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
          echo "TESTFLIGHT_UPLOAD=success" >> $GITHUB_ENV

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          rm -rf ~/private_keys

  create-release:
    name: Create GitHub Release
    needs: [build-android-release, build-ios-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
      MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            CHANGELOG=$(git log --oneline -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            ## Changes
            ${{ env.CHANGELOG }}
          files: |
            android-release-${{ github.sha }}/flutter-apk/app-release.apk
            android-release-${{ github.sha }}/bundle/release/app-release.aab
          draft: false
          prerelease: false

      - name: Notify Mattermost
        run: |
          REPO_NAME="${{ github.repository }}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/$VERSION"
          jq -n \
            --arg channel "bwgii3aooiy39cpy1tu7tcp6tc" \
            --arg message "🚀 **Release $VERSION** published for \`$REPO_NAME\`\n📦 [Download from GitHub]($RELEASE_URL)\n✈️ iOS uploaded to TestFlight" \
            '{channel_id: $channel, message: $message}' | \
          curl -s -X POST "$MATTERMOST_URL/api/v4/posts" \
            -H "Authorization: Bearer $MATTERMOST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-
