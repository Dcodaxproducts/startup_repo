name: Dependency & Security Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6 AM UTC (11 AM PKT)
  push:
    branches: [development]
    paths:
      - 'pubspec.yaml'
      - 'pubspec.lock'
  workflow_dispatch:

concurrency:
  group: deps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
      MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check outdated packages
        id: outdated
        run: |
          OUTDATED=$(flutter pub outdated 2>&1 || true)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTDATED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for upgradable packages
        id: upgradable
        run: |
          UPGRADABLE=$(flutter pub outdated --mode=null-safety 2>&1 || true)
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$UPGRADABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze for security patterns
        id: security
        run: |
          echo "## Security Scan" > security-report.md
          # Check for hardcoded secrets patterns
          ISSUES=$(grep -rn --include="*.dart" -E "(password|secret|api_key|token)\s*[:=]\s*['\"]" lib/ 2>/dev/null || echo "None found")
          echo "### Hardcoded Secrets Check" >> security-report.md
          echo '```' >> security-report.md
          echo "$ISSUES" >> security-report.md
          echo '```' >> security-report.md
          # Check for HTTP (non-HTTPS) URLs
          HTTP_URLS=$(grep -rn --include="*.dart" "http://" lib/ 2>/dev/null | grep -v "localhost\|127.0.0.1\|10.0.2.2" || echo "None found")
          echo "### Insecure HTTP URLs" >> security-report.md
          echo '```' >> security-report.md
          echo "$HTTP_URLS" >> security-report.md
          echo '```' >> security-report.md

      - name: Create issue if problems found
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const outdated = `${{ steps.outdated.outputs.report }}`;
            if (outdated.includes('outdated')) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📦 Dependency Update Report — ${new Date().toISOString().split('T')[0]}`,
                body: `## Outdated Packages\n\`\`\`\n${outdated.slice(0, 3000)}\n\`\`\`\n\nGenerated by dependency-check workflow.`,
                labels: ['dependencies', 'automated']
              });
            }

      - name: Notify Mattermost
        if: github.event_name == 'schedule'
        run: |
          REPO_NAME="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          jq -n \
            --arg channel "bwgii3aooiy39cpy1tu7tcp6tc" \
            --arg message "📦 **Dependency Check** completed for \`$REPO_NAME\`\n[View Report]($RUN_URL)" \
            '{channel_id: $channel, message: $message}' | \
          curl -s -X POST "$MATTERMOST_URL/api/v4/posts" \
            -H "Authorization: Bearer $MATTERMOST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @-
