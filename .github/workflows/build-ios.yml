name: Build iOS

on:
  push:
    branches: [testing, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.2.app
          xcodebuild -version

      - name: Setup Cocoapods
        run: |
          sudo gem install cocoapods -v 1.15.2
          pod --version

      - name: Extract Flutter Version
        run: |
          if [ -f ".fvmrc" ]; then
            export FLUTTER_V=$(cat .fvmrc | jq -r '.flutter // empty')
            [ -n "$FLUTTER_V" ] && echo "FLUTTER_VERSION=$FLUTTER_V" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub upgrade
          flutter pub get
          cd ios && pod install

      - name: Initialize Keychain
        run: |
          pip install codemagic-cli-tools
          keychain initialize

      - name: Import Certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 -d > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERT_PASSWORD"

      - name: Download Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          export PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          export PROFILE_UUID=$(uuidgen)
          echo "$PROFILE_BASE64" | base64 -d > "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "Profile installed: $PROFILE_UUID"

      - name: Build IPA
        run: |
          flutter build ipa --release
          ls -la build/ios/ipa/

      - name: Upload IPA
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          pip install awscli
          export REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          export VERSION=$(grep "version:" pubspec.yaml | sed 's/version: *//' | xargs)
          export BUILD_NUM=$(echo "$GITHUB_SHA" | cut -c1-7)
          
          export IPA_SRC="$(find build/ios/ipa -name '*.ipa' | head -1)"
          export IPA_NAME="${REPO_NAME}_v${VERSION}+${BUILD_NUM}_ios.ipa"
          
          mv "$IPA_SRC" "$IPA_NAME"
          aws s3 cp "$IPA_NAME" "s3://$AWS_BUCKET_NAME/builds/ios/" --acl private
          
          echo "IPA uploaded: s3://$AWS_BUCKET_NAME/builds/ios/$IPA_NAME"
