name: Notify Dev Agent

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, closed]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

env:
  OPENCLAW_URL: ${{ secrets.OPENCLAW_URL }}
  OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}

jobs:
  notify:
    name: Notify Dev Agent
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare Payload
        run: |
          export EVENT_TYPE="${{ github.event_name }}"
          export ACTION="${{ github.event.action }}"
          export PR_NUMBER="${{ github.event.pull_request.number }}"
          export PR_TITLE="${{ github.event.pull_request.title }}"
          export AUTHOR="${{ github.event.pull_request.user.login }}"
          export BRANCH="${{ github.event.pull_request.head.ref }}"
          export REPO="${{ github.repository }}"

          # Build JSON payload file
          cat > /tmp/payload.json << PAYLOAD_EOF
          {
            "event": "$EVENT_TYPE",
            "action": "$ACTION",
            "repository": "$REPO",
            "pr_number": $PR_NUMBER,
            "pr_title": "$PR_TITLE",
            "author": "$AUTHOR",
            "branch": "$BRANCH",
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "base_branch": "${{ github.event.pull_request.base.ref }}"
          }
          PAYLOAD_EOF

      - name: Send to OpenClaw
        run: |
          curl -s -X POST "$OPENCLAW_URL/api/v1/github-webhook" \
            -H "Authorization: Bearer $OPENCLAW_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json || true
