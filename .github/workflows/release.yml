name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        run: |
          export VERSION=$(echo "$GITHUB_REF" | sed 's|refs/tags/||')
          export VERSION_NUMBER=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "Releasing $VERSION"

      - name: Extract Flutter Version
        run: |
          if [ -f ".fvmrc" ]; then
            export FLUTTER_V=$(cat .fvmrc | jq -r '.flutter // empty')
            [ -n "$FLUTTER_V" ] && echo "FLUTTER_VERSION=$FLUTTER_V" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test || true

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Generate Release Notes
        run: |
          export PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            export CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s")
          else
            export CHANGES=$(git log --oneline -20 | sed 's/^/- /')
          fi
          
          echo "CHANGES<<EOF" >> $GITHUB_ENV
          echo "# Release $VERSION" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "$CHANGES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        run: |
          gh release create "$VERSION" \
            build/app/outputs/flutter-apk/app-release.apk \
            build/app/outputs/bundle/release/app-release.aab \
            --title "Release $VERSION" \
            --notes "$CHANGES" \
            || true
