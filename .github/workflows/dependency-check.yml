name: Dependency Check

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  check-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      MATTERMOST_WEBHOOK: ${{ secrets.MATTERMOST_WEBHOOK_URL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Flutter Version
        run: |
          if [ -f ".fvmrc" ]; then
            export FV=$(cat .fvmrc | jq -r '.flutter // empty')
            [ -n "$FV" ] && echo "FLUTTER_VERSION=$FV" >> $GITHUB_ENV
          elif [ -f ".dcodax-ci.yaml" ]; then
            export FV=$(grep "flutter_version:" .dcodax-ci.yaml | cut -d':' -f2 | xargs)
            [ -n "$FV" ] && echo "FLUTTER_VERSION=$FV" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Check Outdated Packages
        run: |
          flutter pub outdated --json > outdated.json

          # Write categorization script to file (avoids YAML escaping issues)
          cat > /tmp/categorize.sh << 'SCRIPT_EOF'
          #!/bin/bash
          # Extract packages with version info
          jq -r '.packages[] | "\(.package)\t\(.current.version // "0.0.0")\t\(.upgradable.version // "0.0.0")\t\(.latest.version // "0.0.0")"' outdated.json | while IFS=$'\t' read -r pkg cur upg lat; do
            [ "$upg" = "null" ] || [ -z "$upg" ] && upg="0.0.0"
            [ "$cur" = "null" ] || [ -z "$cur" ] && continue

            # Skip if no upgrade available
            [ "$upg" = "$cur" ] && [ "$lat" != "$cur" ] && [ "$lat" != "null" ] && echo "blocked|$pkg: $cur → (blocked)|(latest: $lat)" && continue
            [ "$upg" = "$cur" ] && continue

            # Parse versions
            CUR_MAJ=$(echo "$cur" | cut -d. -f1)
            CUR_MIN=$(echo "$cur" | cut -d. -f2)
            UPG_MAJ=$(echo "$upg" | cut -d. -f1)
            UPG_MIN=$(echo "$upg" | cut -d. -f2)

            if [ "$CUR_MAJ" != "$UPG_MAJ" ]; then
              echo "major|$pkg: $cur → $upg|(latest: $lat)"
            elif [ "$CUR_MIN" != "$UPG_MIN" ]; then
              echo "minor|$pkg: $cur → $upg|(latest: $lat)"
            else
              echo "patch|$pkg: $cur → $upg|(latest: $lat)"
            fi
          done
          SCRIPT_EOF
          chmod +x /tmp/categorize.sh
          bash /tmp/categorize.sh > /tmp/updates.tsv

          awk -F'|' '$1=="patch"{print $2}' /tmp/updates.tsv > /tmp/patch_updates.txt || true
          awk -F'|' '$1=="minor"{print $2}' /tmp/updates.tsv > /tmp/minor_updates.txt || true
          awk -F'|' '$1=="major"{print $2}' /tmp/updates.tsv > /tmp/major_updates.txt || true
          awk -F'|' '$1=="blocked"{print $2 " " $3}' /tmp/updates.tsv > /tmp/blocked_updates.txt || true

          export PATCH_COUNT=$(grep -c "→" /tmp/patch_updates.txt 2>/dev/null || echo "0")
          export MINOR_COUNT=$(grep -c "→" /tmp/minor_updates.txt 2>/dev/null || echo "0")
          export MAJOR_COUNT=$(grep -c "→" /tmp/major_updates.txt 2>/dev/null || echo "0")
          export BLOCKED_COUNT=$(wc -l < /tmp/blocked_updates.txt 2>/dev/null | xargs || echo "0")

          echo "PATCH_COUNT=$PATCH_COUNT" >> $GITHUB_ENV
          echo "MINOR_COUNT=$MINOR_COUNT" >> $GITHUB_ENV
          echo "MAJOR_COUNT=$MAJOR_COUNT" >> $GITHUB_ENV
          echo "BLOCKED_COUNT=$BLOCKED_COUNT" >> $GITHUB_ENV

          echo "Patch: $PATCH_COUNT | Minor: $MINOR_COUNT | Major: $MAJOR_COUNT | Blocked: $BLOCKED_COUNT"

      - name: Create PR for Patch Updates
        if: env.PATCH_COUNT != '0'
        run: |
          # Skip if open dependency PR already exists
          export EXISTING=$(gh pr list --search "auto-update patch dependencies" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open dependency PR already exists, skipping."
            exit 0
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          export BRANCH="chore/auto-update-dependencies-$GITHUB_RUN_ID"
          git checkout -b "$BRANCH"

          # Only update within existing constraints, don't remove anything
          flutter pub upgrade
          git checkout -- pubspec.yaml

          git add pubspec.lock
          git diff --cached --quiet && echo "No lock changes" && exit 0

          echo "chore: auto-update patch dependencies" > /tmp/commit_msg.txt
          echo "" >> /tmp/commit_msg.txt
          cat /tmp/patch_updates.txt >> /tmp/commit_msg.txt

          git commit -F /tmp/commit_msg.txt

          git push origin "$BRANCH" --force

          gh label create "dependencies" --color 0075ca --description "Dependency updates" 2>/dev/null || true

          echo "## Automated Dependency Update" > /tmp/pr_body.txt
          echo "" >> /tmp/pr_body.txt
          echo "Patch-level updates (within existing constraints):" >> /tmp/pr_body.txt
          echo "" >> /tmp/pr_body.txt
          cat /tmp/patch_updates.txt >> /tmp/pr_body.txt
          echo "" >> /tmp/pr_body.txt
          echo "### Verification" >> /tmp/pr_body.txt
          echo "- [ ] Tests pass" >> /tmp/pr_body.txt
          echo "- [ ] App builds successfully" >> /tmp/pr_body.txt
          echo "" >> /tmp/pr_body.txt
          echo "**Auto-generated by dependency-check workflow**" >> /tmp/pr_body.txt

          gh pr create \
            --title "chore: Auto-update patch dependencies" \
            --body-file /tmp/pr_body.txt \
            --base development \
            --head "$BRANCH" \
            --label "dependencies" || true

      - name: Ensure Labels Exist
        if: env.MINOR_COUNT != '0' || env.MAJOR_COUNT != '0' || env.BLOCKED_COUNT != '0'
        run: |
          gh label create "dependencies" --color 0075ca --description "Dependency updates" 2>/dev/null || true
          gh label create "maintenance" --color fbca04 --description "Maintenance tasks" 2>/dev/null || true

      - name: Create Issue for Minor/Major/Blocked Updates
        if: env.MINOR_COUNT != '0' || env.MAJOR_COUNT != '0' || env.BLOCKED_COUNT != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => (fs.existsSync(p) ? fs.readFileSync(p, 'utf8').trim() : '');
            const minorUpdates = read('/tmp/minor_updates.txt');
            const majorUpdates = read('/tmp/major_updates.txt');
            const blockedUpdates = read('/tmp/blocked_updates.txt');

            const title = '📦 Dependency Updates Available';
            let body = '## Dependency Updates Available\n\nManual review required:\n\n';

            if (minorUpdates) {
              body += '### Minor Updates\n```\n' + minorUpdates + '\n```\n\n';
            }
            if (majorUpdates) {
              body += '### ⚠️ Major Updates\n```\n' + majorUpdates + '\n```\n\n';
            }
            if (blockedUpdates) {
              body += '### 🚧 Blocked by Constraints\n```\n' + blockedUpdates + '\n```\n\n';
            }

            body += '### Action Required\n';
            body += '1. Review changelogs\n';
            body += '2. Test in feature branch\n';
            body += '3. Adjust constraints if needed\n';
            body += '4. Create PR with updates\n\n';
            body += '**Auto-generated by weekly dependency check**';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,maintenance',
              per_page: 100
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              console.log('Open issue already exists (#' + existing.number + '), skipping.');
              return;
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dependencies', 'maintenance']
              });
            }

      - name: Post to Mattermost
        run: |
          export REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          export TEXT="### 📦 Weekly Dependency Check
          **Repository:** ${REPO_NAME}
          **Patch:** ${PATCH_COUNT} | **Minor:** ${MINOR_COUNT} | **Major:** ${MAJOR_COUNT} | **Blocked:** ${BLOCKED_COUNT}"

          if [ "$PATCH_COUNT" -gt "0" ]; then
            export TEXT="$TEXT
          ✅ Patch updates: PR created automatically"
          fi

          if [ "$MINOR_COUNT" -gt "0" ] || [ "$MAJOR_COUNT" -gt "0" ] || [ "$BLOCKED_COUNT" -gt "0" ]; then
            export TEXT="$TEXT
          ⚠️ Manual review needed: Issue updated/created"
          fi

          if [ "$PATCH_COUNT" -eq "0" ] && [ "$MINOR_COUNT" -eq "0" ] && [ "$MAJOR_COUNT" -eq "0" ] && [ "$BLOCKED_COUNT" -eq "0" ]; then
            export TEXT="$TEXT
          🎉 All dependencies up to date!"
          fi

          export PAYLOAD=$(jq -n --arg text "$TEXT" '{text:$text}')
          curl -s -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$MATTERMOST_WEBHOOK" || true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            outdated.json
            /tmp/patch_updates.txt
            /tmp/minor_updates.txt
            /tmp/major_updates.txt
            /tmp/blocked_updates.txt
          retention-days: 30
