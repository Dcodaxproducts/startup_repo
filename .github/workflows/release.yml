      - name: Build Android APK
        run: |
          flutter build apk --release --split-per-abi
          echo "✅ Android APK built"
      
      - name: Build Android AAB
        run: |
          flutter build appbundle --release
          echo "✅ Android AAB built"
      
      - name: Upload to S3 (Production)
        id: s3-upload
        run: |
          # Install AWS CLI
          sudo apt-get update
          sudo apt-get install -y awscli
          
          # Configure AWS
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_REGION="${{ secrets.AWS_REGION }}"
          
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          VERSION="${{ steps.version.outputs.version }}"
          
          S3_PATH="s3://${{ secrets.AWS_BUCKET_NAME }}/${REPO_NAME}/production/${VERSION}/"
          
          # Upload APKs and AAB
          aws s3 cp build/app/outputs/flutter-apk/ ${S3_PATH} --recursive --exclude "*" --include "*.apk"
          aws s3 cp build/app/outputs/bundle/release/app-release.aab ${S3_PATH}
          
          # Generate download URLs
          APK_ARM64_URL=$(aws s3 presign "${S3_PATH}app-arm64-v8a-release.apk" --expires-in 31536000)
          AAB_URL=$(aws s3 presign "${S3_PATH}app-release.aab" --expires-in 31536000)
          
          echo "apk_url=${APK_ARM64_URL}" >> $GITHUB_OUTPUT
          echo "aab_url=${AAB_URL}" >> $GITHUB_OUTPUT
          
          echo "✅ Uploaded to S3: ${S3_PATH}"
      
      - name: Create GitHub Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('/tmp/changelog.md', 'utf8');
            
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.version }}',
              name: '${{ steps.version.outputs.version }}',
              body: changelog,
              draft: false,
              prerelease: false
            });
            
            return release.data.id;
      
      - name: Upload release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const releaseId = ${{ steps.create-release.outputs.result }};
            
            const uploadAsset = async (filePath, name) => {
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: name,
                data: data
              });
            };
            
            // Upload APKs
            await uploadAsset('build/app/outputs/flutter-apk/app-arm64-v8a-release.apk', 'app-arm64-v8a.apk');
            await uploadAsset('build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk', 'app-armeabi-v7a.apk');
            await uploadAsset('build/app/outputs/flutter-apk/app-x86_64-release.apk', 'app-x86_64.apk');
            
            // Upload AAB
            await uploadAsset('build/app/outputs/bundle/release/app-release.aab', 'app-release.aab');
      
      - name: Post to Mattermost
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.version }}"
          
          PAYLOAD=$(cat <<EOF
          {
            "text": "### 🎉 New Release Published\n**Repository:** ${REPO_NAME}\n**Version:** ${{ steps.version.outputs.version }}\n**Release:** [View on GitHub](${RELEASE_URL})\n\n${{ steps.changelog.outputs.changelog }}\n\n**Downloads:**\n- [APK (ARM64)](${{ steps.s3-upload.outputs.apk_url }})\n- [AAB (Play Store)](${{ steps.s3-upload.outputs.aab_url }})\n\n@channel New release is live! 🚀"
          }
          EOF
          )
          
          curl -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            ${{ secrets.MATTERMOST_WEBHOOK_URL }}
