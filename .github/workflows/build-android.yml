name: Build Android

on:
  push:
    branches: [testing, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Flutter Version
        run: |
          if [ -f ".fvmrc" ]; then
            export FLUTTER_V=$(cat .fvmrc | jq -r '.flutter // empty')
            [ -n "$FLUTTER_V" ] && echo "FLUTTER_VERSION=$FLUTTER_V" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AWS CLI
        run: |
          pip install awscli

      - name: Configure AWS
        run: |
          export AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}"
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set region "$AWS_REGION"
          echo "Bucket: $AWS_BUCKET_NAME"

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Install Dependencies
        run: |
          flutter pub upgrade
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Rename and Upload
        continue-on-error: true
        run: |
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          VERSION=$(grep "version:" pubspec.yaml | sed 's/version: *//' | xargs)
          BUILD_NUM=$(echo "$GITHUB_SHA" | cut -c1-7)
          
          APK_SRC="build/app/outputs/flutter-apk/app-release.apk"
          AAB_SRC="build/app/outputs/bundle/release/app-release.aab"
          
          APK_NAME="${REPO_NAME}_v${VERSION}+${BUILD_NUM}_android.apk"
          AAB_NAME="${REPO_NAME}_v${VERSION}+${BUILD_NUM}_android.aab"
          
          mv "$APK_SRC" "$APK_NAME"
          mv "$AAB_SRC" "$AAB_NAME"
          
          if [ -z "$AWS_BUCKET_NAME" ]; then
            echo "⚠️ AWS_BUCKET_NAME not set — skipping S3 upload"
            echo "APK: $APK_NAME (local only)"
            echo "AAB: $AAB_NAME (local only)"
          else
            echo "Uploading to S3..."
            aws s3 cp "$APK_NAME" "s3://${AWS_BUCKET_NAME}/builds/android/" --acl private
            aws s3 cp "$AAB_NAME" "s3://${AWS_BUCKET_NAME}/builds/android/" --acl private
            echo "APK: s3://${AWS_BUCKET_NAME}/builds/android/${APK_NAME}"
            echo "AAB: s3://${AWS_BUCKET_NAME}/builds/android/${AAB_NAME}"
          fi

      - name: Post to Mattermost
        env:
          MATTERMOST_URL: ${{ secrets.MATTERMOST_URL }}
          MATTERMOST_TOKEN: ${{ secrets.MATTERMOST_TOKEN }}
          CHANNEL_ID: ${{ secrets.MATTERMOST_CHANNEL_ID }}
        run: |
          export REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          export BRANCH="${GITHUB_REF#refs/heads/}"
          
          export MSG="### Build Complete - ${REPO_NAME}\n**Branch:** ${BRANCH}\n**Type:** Android\n\nAPK and AAB built and uploaded to S3."
          export PAYLOAD=$(jq -n --arg ch "$CHANNEL_ID" --arg msg "$MSG" '{channel_id:$ch, message:$msg}')
          curl -s -X POST "$MATTERMOST_URL/api/v4/posts" \
            -H "Authorization: Bearer $MATTERMOST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
