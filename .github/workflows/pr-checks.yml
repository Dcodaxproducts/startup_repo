name: PR Checks

on:
  workflow_dispatch:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Title
        if: github.event_name == 'pull_request'
        run: |
          export TITLE="${{ github.event.pull_request.title }}"
          export VALID_TYPES="feat|fix|chore|docs|refactor|test|ci|perf|style|build"

          if ! echo "$TITLE" | grep -qE "^($VALID_TYPES)(\(.+\))?: .+"; then
            echo "PR title must follow: type(scope): description"
            echo "Example: feat(auth): add login screen"
            exit 1
          fi
          echo "PR title valid: $TITLE"

      - name: Check Branch Alignment
        if: github.event_name == 'pull_request'
        run: |
          export BRANCH="${{ github.head_ref }}"
          export TARGET="${{ github.base_ref }}"

          if echo "$BRANCH" | grep -q "^hotfix/"; then
            if [ "$TARGET" != "main" ]; then
              echo "Hotfix branches must target main"
              exit 1
            fi
          fi

          echo "Branch alignment valid: $BRANCH -> $TARGET"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        run: |
          export PR_NUM="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUM" --body "✅ PR validation passed" || true

      - name: Manual Run Summary
        if: github.event_name == 'workflow_dispatch'
        run: echo "PR checks skipped on manual dispatch — trigger via PR to test."
