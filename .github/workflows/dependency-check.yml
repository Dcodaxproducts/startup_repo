name: Dependency Check

on:
  schedule:
    # Every Monday at 10:00 AM UTC
    - cron: '0 10 * * 1'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  check-dependencies:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get Flutter version
        id: flutter-version
        run: |
          if [ -f ".fvmrc" ]; then
            VERSION=$(grep "flutter" .fvmrc | cut -d'"' -f2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          elif [ -f ".dcodax-ci.yaml" ]; then
            VERSION=$(grep "flutter_version:" .dcodax-ci.yaml | cut -d':' -f2 | xargs)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "version=${{ env.FLUTTER_VERSION }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Check for outdated packages
        id: outdated
        run: |
          flutter pub outdated --json > outdated.json
          
          # Parse JSON and categorize updates
          PATCH_UPDATES=$(cat outdated.json | jq -r '.packages[] | select(.latest != .current and .upgradable == .latest) | "\(.package): \(.current) → \(.latest)"')
          MINOR_UPDATES=$(cat outdated.json | jq -r '.packages[] | select(.upgradable != .latest and .upgradable != null) | "\(.package): \(.current) → \(.upgradable)"')
          MAJOR_UPDATES=$(cat outdated.json | jq -r '.packages[] | select(.resolvable != .current and .upgradable == null) | "\(.package): \(.current) → \(.resolvable)"')
          
          # Count updates
          PATCH_COUNT=$(echo "$PATCH_UPDATES" | grep -c "→" || echo "0")
          MINOR_COUNT=$(echo "$MINOR_UPDATES" | grep -c "→" || echo "0")
          MAJOR_COUNT=$(echo "$MAJOR_UPDATES" | grep -c "→" || echo "0")
          
          echo "patch_count=$PATCH_COUNT" >> $GITHUB_OUTPUT
          echo "minor_count=$MINOR_COUNT" >> $GITHUB_OUTPUT
          echo "major_count=$MAJOR_COUNT" >> $GITHUB_OUTPUT
          
          # Save updates to files
          echo "$PATCH_UPDATES" > /tmp/patch_updates.txt
          echo "$MINOR_UPDATES" > /tmp/minor_updates.txt
          echo "$MAJOR_UPDATES" > /tmp/major_updates.txt
          
          echo "Patch updates: $PATCH_COUNT"
          echo "Minor updates: $MINOR_COUNT"
          echo "Major updates: $MAJOR_COUNT"
      
      - name: Create PR for patch updates
        if: steps.outdated.outputs.patch_count > 0
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Create new branch
          BRANCH="chore/auto-update-dependencies-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          
          # Update dependencies
          flutter pub upgrade --major-versions
          
          # Create commit
          git add pubspec.lock
          git commit -m "chore: auto-update patch dependencies

$(cat /tmp/patch_updates.txt)

Automated dependency update by GitHub Actions." || exit 0
          
          # Push branch
          git push origin $BRANCH
          
          # Create PR using GitHub CLI
          gh pr create \
            --title "chore: Auto-update patch dependencies" \
            --body "## Automated Dependency Update

This PR updates the following patch-level dependencies:

$(cat /tmp/patch_updates.txt)

### Verification
- [ ] Tests pass
- [ ] App builds successfully
- [ ] No breaking changes

**Auto-generated by dependency-check workflow**" \
            --base main \
            --head $BRANCH \
            --label "dependencies"
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: Create issues for minor/major updates
        if: steps.outdated.outputs.minor_count > 0 || steps.outdated.outputs.major_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const minorUpdates = fs.readFileSync('/tmp/minor_updates.txt', 'utf8').trim();
            const majorUpdates = fs.readFileSync('/tmp/major_updates.txt', 'utf8').trim();
            
            let body = '## Dependency Updates Available\n\n';
            body += 'The following dependency updates require manual review:\n\n';
            
            if (minorUpdates) {
              body += '### Minor Updates\n';
              body += 'These updates may include new features but should be backwards compatible:\n\n';
              body += '```\n' + minorUpdates + '\n```\n\n';
            }
            
            if (majorUpdates) {
              body += '### ⚠️ Major Updates\n';
              body += 'These updates may include breaking changes and require code changes:\n\n';
              body += '```\n' + majorUpdates + '\n```\n\n';
            }
            
            body += '### Action Required\n';
            body += '1. Review the changelog for each package\n';
            body += '2. Test the updates in a feature branch\n';
            body += '3. Update code if needed for breaking changes\n';
            body += '4. Create a PR with the updates\n\n';
            body += '**Auto-generated by weekly dependency check**';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Dependency Updates Available',
              body: body,
              labels: ['dependencies', 'maintenance']
            });
      
      - name: Generate summary report
        id: summary
        run: |
          REPORT="## Dependency Check Summary\n\n"
          REPORT="${REPORT}**Patch Updates:** ${{ steps.outdated.outputs.patch_count }}\n"
          REPORT="${REPORT}**Minor Updates:** ${{ steps.outdated.outputs.minor_count }}\n"
          REPORT="${REPORT}**Major Updates:** ${{ steps.outdated.outputs.major_count }}\n\n"
          
          if [ "${{ steps.outdated.outputs.patch_count }}" -gt "0" ]; then
            REPORT="${REPORT}✅ Patch updates: PR created automatically\n"
          fi
          
          if [ "${{ steps.outdated.outputs.minor_count }}" -gt "0" ] || [ "${{ steps.outdated.outputs.major_count }}" -gt "0" ]; then
            REPORT="${REPORT}⚠️ Minor/Major updates: Issue created for manual review\n"
          fi
          
          if [ "${{ steps.outdated.outputs.patch_count }}" -eq "0" ] && [ "${{ steps.outdated.outputs.minor_count }}" -eq "0" ] && [ "${{ steps.outdated.outputs.major_count }}" -eq "0" ]; then
            REPORT="${REPORT}🎉 All dependencies are up to date!\n"
          fi
          
          echo -e "$REPORT" > /tmp/summary.md
          
          # Save for Mattermost
          REPORT_ESCAPED=$(echo -e "$REPORT" | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Post to Mattermost
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          PAYLOAD=$(cat <<EOF
          {
            "text": "### 📦 Weekly Dependency Check\n**Repository:** ${REPO_NAME}\n\n${{ steps.summary.outputs.report }}\n**Details:** [View Workflow]({{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          }
          EOF
          )
          
          curl -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      
      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            outdated.json
            /tmp/patch_updates.txt
            /tmp/minor_updates.txt
            /tmp/major_updates.txt
          retention-days: 30
