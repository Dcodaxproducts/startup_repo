## Common Issues

### Issue: "Flutter command not found"

**Solution:** Add Flutter to your PATH:

\`\`\`bash
export PATH="\$PATH:[PATH_TO_FLUTTER]/flutter/bin"
\`\`\`

### Issue: "Gradle build failed"

**Solution:**

\`\`\`bash
cd android
./gradlew clean
cd ..
flutter clean
flutter pub get
flutter build apk
\`\`\`

### Issue: "CocoaPods not installed" (iOS)

**Solution:**

\`\`\`bash
sudo gem install cocoapods
cd ios
pod install
cd ..
\`\`\`

### Issue: "Version solving failed"

**Solution:**

\`\`\`bash
flutter clean
flutter pub get
# If still failing, check for conflicting dependencies in pubspec.yaml
\`\`\`

### Issue: "Simulator not found" (iOS)

**Solution:**

\`\`\`bash
# List available simulators
xcrun simctl list devices

# Boot a simulator
xcrun simctl boot "iPhone 15 Pro"

# Or open Simulator app
open -a Simulator
\`\`\`

